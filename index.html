<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公考备考工具箱</title>
<style>
  html,body{margin:0;padding:0;width:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
  body{background:linear-gradient(180deg,#0066eb 0%,#0066eb 18%,#ffffff 55%,#ffffff 100%);display:flex;align-items:center;justify-content:center}

  .canvas{width:100%;max-width:1300px;padding:20px 30px 40px}

  .title-wrap{display:flex;justify-content:space-between;max-width:534px;margin:0 auto 28px}
  .title-wrap span{color:#fff;font-size:96px;font-weight:800;line-height:1}
  .subtitle{text-align:center;color:rgba(255,255,255,.7);font-size:14px;font-weight:300;letter-spacing:2px;margin-bottom:52px}

  .row-label{max-width:1100px;margin:0 auto 14px;padding-left:4px;font-size:18px;font-weight:700;letter-spacing:2px}
  .row-label.l1{color:rgba(255,255,255,.9)}
  .row-label.l2{color:#0066eb}
  .divider{width:60px;height:2px;background:rgba(255,255,255,.35);margin:0 auto 24px;border-radius:1px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:24px;max-width:1100px;margin:0 auto 40px}
  .ai-grid{grid-template-columns:1fr 1fr 1fr 1fr;max-width:1100px}
  @media(max-width:1100px){.grid{grid-template-columns:1fr 1fr 1fr;gap:20px}}
  @media(max-width:768px){.grid{grid-template-columns:1fr 1fr;gap:16px}.ai-grid{max-width:100%}}
  @media(max-width:500px){.grid{grid-template-columns:1fr 1fr;gap:16px}}

  .card{background:#fff;border-radius:32px;padding:44px 24px 34px;display:flex;flex-direction:column;align-items:center;gap:20px;text-decoration:none;box-shadow:0 4px 24px rgba(0,0,0,.08);cursor:pointer;transition:all .4s cubic-bezier(.25,.1,.25,1);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0066eb,#8b5cf6,#0066eb);opacity:0;transition:opacity .4s}
  .card:hover{transform:translateY(-10px);box-shadow:0 20px 48px rgba(0,102,235,.15),0 8px 16px rgba(0,0,0,.06)}
  .card:hover::before{opacity:1}

  .card .icon{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .4s cubic-bezier(.25,.1,.25,1)}
  .card .icon svg{width:46px;height:46px;transition:all .4s}
  .card:hover .icon{transform:scale(1.08);box-shadow:0 8px 24px rgba(0,102,235,.12)}
  .i-blue{background:linear-gradient(135deg,#e8ecff,#c8d4ff)}.i-blue svg{color:#5865f2}
  .i-purple{background:linear-gradient(135deg,#f0e8ff,#dcccff)}.i-purple svg{color:#8b5cf6}
  .i-green{background:linear-gradient(135deg,#e8faf0,#c8f0d8)}.i-green svg{color:#16a34a}
  .i-amber{background:linear-gradient(135deg,#fff8e8,#ffe0b8)}.i-amber svg{color:#d97706}
  .i-red{background:linear-gradient(135deg,#ffe8e8,#ffcccc)}.i-red svg{color:#dc2626}

  .card .name{font-size:18px;font-weight:800;color:#1d1d1f;letter-spacing:-.3px;transition:color .4s}
  .card:hover .name{color:#0066eb}
  .card .desc{font-size:13px;color:#9a9aa0;line-height:1.6;text-align:center}

  @media(max-width:900px){
    .title-wrap{max-width:400px}
    .title-wrap span{font-size:64px}
    .card{padding:30px 14px 24px;border-radius:24px;gap:12px}
    .card .icon{width:72px;height:72px}
    .card .icon svg{width:30px;height:30px}
    .card .name{font-size:15px}.card .desc{font-size:12px}
  }
  @media(max-width:768px){
    .title-wrap{max-width:300px}
    .title-wrap span{font-size:48px}
    .card{padding:22px 10px 18px;gap:10px;border-radius:18px}
    .card .icon{width:56px;height:56px}
    .card .icon svg{width:24px;height:24px}
    .card .name{font-size:13px}
    .card .desc{font-size:10px}
    .grid{gap:14px}
  }
</style>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="canvas">

  <div class="title-wrap"><span>苏</span><span>考</span><span>智</span><span>辅</span></div>
  <div class="subtitle">2026江苏省考 &nbsp;|&nbsp; 一站式公考 · 智能刷题 · AI辅助</div>

  <div class="row-label l1">主功能</div>
  <div class="grid">
    <!-- 筛岗选职 — search + filter -->
    <a href="jiangsu-jobs-2026/index.html" class="card">
      <div class="icon i-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg></div>
      <div class="name">筛岗选职</div>
      <div class="desc">江苏省公职招录<br>职位筛选系统</div>
    </a>

    <!-- 行测刷题 — pen/edit -->
    <a href="xct/index.html" class="card">
      <div class="icon i-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/><polyline points="9 14 6 17 4 20 7 18 10 15"/></svg></div>
      <div class="name">行测刷题</div>
      <div class="desc">六大模块 · AI 解析<br>花生十三解题法</div>
    </a>

    <!-- 申论刷题 — document writing -->
    <a href="shenlun-ai/index.html" class="card">
      <div class="icon i-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg></div>
      <div class="name">申论刷题</div>
      <div class="desc">五大题型 · AI 批改<br>多维智能评分</div>
    </a>

    <!-- 面试模拟 — chat / mic -->
    <a href="mock-interview/index.html" class="card">
      <div class="icon i-amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
      <div class="name">面试模拟</div>
      <div class="desc">AI 考官 · 语音作答<br>逐项点评反馈</div>
    </a>

  </div>

  <div class="divider"></div>
  <div class="row-label l2">拓展功能</div>
  <div class="grid">
    <!-- 每日时政 — globe -->
    <a href="shizheng/index.html" class="card">
      <div class="icon i-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
      <div class="name">每日时政</div>
      <div class="desc">时政热点 · 考点表格<br>申论素材积累</div>
    </a>

    <!-- 重要讲话 — podium -->
    <a href="speech/index.html" class="card">
      <div class="icon i-red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="18" rx="2"/><line x1="9" y1="6" x2="15" y2="6"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/><polygon points="11 20 6 22 18 22 13 20"/></svg></div>
      <div class="name">重要讲话</div>
      <div class="desc">领导人讲话全文<br>考点式摘要</div>
    </a>

    <!-- 规范词 — open book -->
    <a href="sl-words/index.html" class="card">
      <div class="icon i-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></div>
      <div class="name">规范词</div>
      <div class="desc">申论规范表达<br>高频词汇速查</div>
    </a>

    <!-- 高频成语 — library / stack -->
    <a href="idiom/index.html" class="card">
      <div class="icon i-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div>
      <div class="name">高频成语</div>
      <div class="desc">行测言语理解<br>成语实词速记</div>
    </a>

  </div>

  <div class="divider"></div>
  <div class="row-label l2">AI服务</div>
  <div class="grid ai-grid">
    <a href="ai-quiz/index.html" class="card">
      <div class="icon i-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div class="name">AI出题</div>
      <div class="desc">AI 智能生成题目<br>自动批改+详细解析</div>
    </a>
    <a href="ai-tutor/index.html" class="card">
      <div class="icon i-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
      <div class="name">AI辅学</div>
      <div class="desc">AI 考公学习助手<br>任何问题随时解答</div>
    </a>
  </div>

</div>

</body>
</html>
